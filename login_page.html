<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>BrightPath - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#d3e4fe",
                        "on-tertiary-fixed-variant": "#653e00",
                        "sidebar-bg": "#FFFFFF",
                        "surface": "#f8f9ff",
                        "on-secondary": "#ffffff",
                        "background": "#f8f9ff",
                        "primary-fixed-dim": "#b4c5ff",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#ffb95f",
                        "secondary-fixed-dim": "#4edea3",
                        "on-tertiary-fixed": "#2a1700",
                        "on-primary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "surface-bright": "#f8f9ff",
                        "primary-container": "#2563eb",
                        "error-container": "#ffdad6",
                        "bg-main": "#F8FAFC",
                        "on-secondary-fixed": "#002113",
                        "inverse-primary": "#b4c5ff",
                        "on-tertiary-container": "#ffeedd",
                        "tertiary-container": "#996100",
                        "tertiary": "#784b00",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-tint": "#0053db",
                        "secondary-container": "#6cf8bb",
                        "on-primary-container": "#eeefff",
                        "surface-container-low": "#eff4ff",
                        "on-primary-fixed-variant": "#003ea8",
                        "on-background": "#0b1c30",
                        "surface-container-highest": "#d3e4fe",
                        "on-surface": "#0b1c30",
                        "outline-variant": "#c3c6d7",
                        "outline": "#737686",
                        "on-secondary-fixed-variant": "#005236",
                        "accent-purple": "#8B5CF6",
                        "primary-fixed": "#dbe1ff",
                        "secondary": "#006c49",
                        "on-surface-variant": "#434655",
                        "inverse-surface": "#213145",
                        "on-primary-fixed": "#00174b",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#dce9ff",
                        "surface-container": "#e5eeff",
                        "on-error": "#ffffff",
                        "primary": "#004ac6",
                        "waitlist-blue": "#3B82F6",
                        "on-secondary-container": "#00714d",
                        "tertiary-fixed": "#ffddb8",
                        "surface-container-lowest": "#ffffff",
                        "danger": "#EF4444",
                        "secondary-fixed": "#6ffbbe",
                        "surface-dim": "#cbdbf5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-max-width": "1440px",
                        "sidebar-collapsed": "80px",
                        "sidebar-width": "260px",
                        "stack-gap": "16px",
                        "gutter": "24px",
                        "margin-mobile": "16px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "headline-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface-container min-h-screen flex items-center justify-center p-4">
<!-- Login Container -->
<main class="w-full max-w-md">
<!-- Logo Area -->
<div class="flex flex-col items-center justify-center mb-8">
<div class="w-12 h-12 bg-primary-container rounded-lg flex items-center justify-center mb-4 shadow-sm" style="background-color: rgb(37, 99, 235);"><span class="material-symbols-outlined text-on-primary-container text-[28px]" style="font-variation-settings: 'FILL' 1;">book</span></div>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">BrightPath</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Educational Management Portal</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest shadow-[0px_10px_15px_-3px_rgba(0,0,0,0.1)] p-8 border border-outline-variant/30 relative overflow-hidden rounded-lg">
<!-- Decorative subtle top border -->
<div class="absolute top-0 left-0 w-full h-1 bg-primary" style="background-color: rgb(37, 99, 235);"></div>
<form class="space-y-6">
<!-- Role Dropdown -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface" for="role">Select Role</label>
<div class="relative">
<select class="block w-full pl-3 pr-10 py-3 text-base border-outline-variant rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm bg-surface font-body-md text-body-md text-on-surface transition-all duration-200 appearance-none" id="role" name="role">
<option disabled="" selected="" value="">Select Role</option>
<option value="admin">Admin</option>
<option value="faculty">Faculty</option>
<option value="accounts">Accounts</option>
<option value="student">Student</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-outline">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Username/Email Field -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface" for="username">Email or Username</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm bg-surface font-body-md text-body-md text-on-surface transition-all duration-200" id="username" name="username" placeholder="Enter your email or username" type="text">
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed-variant transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm bg-surface font-body-md text-body-md text-on-surface transition-all duration-200" id="password" name="password" placeholder="••••••••" type="password">
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Submit Button -->
<div class="pt-2">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md text-on-primary bg-primary-container hover:bg-primary-container/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200 items-center gap-2" type="button" style="background-color: rgb(37, 99, 235);">
<span class="">Login</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</form>
<!-- Support Footer -->
<div class="mt-8 pt-6 border-t border-outline-variant/30 text-center">
<p class="font-body-md text-body-md text-on-surface-variant text-sm">Need help accessing your account? <a class="text-primary hover:underline font-medium" href="#">Contact Support</a></p>
</div>
</div>
</main>


</body></html>
