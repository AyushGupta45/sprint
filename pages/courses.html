<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CEFTS - Courses</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
    <link rel="stylesheet" href="../css/styles.css?v=1.1" />
  </head>
  <body>
    <div id="app-shell"></div>

    <!-- Add/Edit Course Modal (Admin only) -->
    <div id="courseModal" class="modal-overlay hidden">
      <div class="modal-box">
        <div class="modal-header">
          <h3 id="courseModalTitle">Add Course</h3>
          <button class="icon-btn" id="closeCourseModal">
            <span class="material-icons">close</span>
          </button>
        </div>
        <form id="courseForm" class="modal-form">
          <input type="hidden" id="courseId" />
          <div class="form-group">
            <label for="crName">Course Name</label>
            <input type="text" id="crName" />
          </div>
          <div class="form-group">
            <label for="crBatch">Batch</label>
            <input type="text" id="crBatch" />
          </div>
          <div class="form-group">
            <label for="crDuration">Duration</label>
            <input type="text" id="crDuration" placeholder="e.g. 10 weeks" />
          </div>
          <div class="form-group">
            <label for="crSchedule">Schedule Slot</label>
            <input
              type="text"
              id="crSchedule"
              placeholder="e.g. Mon-Wed 10:00-11:00"
            />
          </div>
          <div class="form-group">
            <label for="crCapacity">Capacity</label>
            <input type="number" id="crCapacity" min="1" />
          </div>
          <div class="form-group">
            <label for="crFee">Base Fee (₹)</label>
            <input type="number" id="crFee" min="0" />
          </div>
          <div class="form-group">
            <label for="crPrerequisite">Prerequisite Course</label>
            <select id="crPrerequisite">
              <option value="">None</option>
            </select>
          </div>
          <div class="form-group">
            <label for="crFaculty">Assign Faculty</label>
            <select id="crFaculty">
              <option value="">Unassigned</option>
            </select>
          </div>
          <div class="form-group">
            <label for="crFeePlanType">Fee Plan Type</label>
            <select id="crFeePlanType">
              <option value="One-Time">One-Time</option>
              <option value="Installment">Installment</option>
            </select>
          </div>
          <div id="courseFormError" class="form-error hidden"></div>
          <div class="modal-actions">
            <button
              type="button"
              class="btn btn-secondary"
              id="cancelCourseForm"
            >
              Cancel
            </button>
            <button type="submit" class="btn btn-primary">Save Course</button>
          </div>
        </form>
      </div>
    </div>

    <script src="../js/db.js"></script>
    <script src="../js/seed.js"></script>
    <script src="../js/validators.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/app.js"></script>
    <script>
      let currentUser;
      let currentAdminCoursesPage = 1;
      let currentFacultyCoursesPage = 1;
      let currentCatalogPage = 1;

      (async () => {
        await initSeed();
        currentUser = renderShell("courses.html");
        if (!currentUser) return;
        renderCoursesPage();
      })();

      function renderCoursesPage() {
        const main = document.getElementById("main-content");

        if (currentUser.role === "admin") {
          main.innerHTML = `
          <div class="page-header">
            <h2 class="page-title">Courses</h2>
            <button class="btn btn-primary" id="addCourseBtn"><span class="material-icons">add</span> Add Course</button>
          </div>
          <div class="toolbar" style="margin-bottom: 1.25rem;">
            <div style="position:relative; width:100%; max-width:320px;">
              <span class="material-icons" style="position:absolute; left:0.875rem; top:50%; transform:translateY(-50%); color:hsl(var(--muted-foreground)); font-size:1.125rem; pointer-events:none;">search</span>
              <input type="text" id="adminCourseSearch" class="form-control" placeholder="Search courses by name or batch..." style="padding-left:2.5rem; border-radius:10px; height:38px;">
            </div>
          </div>
          <div id="coursesTableWrap"></div>
          <div id="adminCoursesPagination"></div>
        `;
          document
            .getElementById("addCourseBtn")
            .addEventListener("click", () => openCourseModal());
          currentAdminCoursesPage = 1;
          document.getElementById("adminCourseSearch").addEventListener("input", (e) => {
             currentAdminCoursesPage = 1;
             renderAdminCourseTable(e.target.value);
          });
          renderAdminCourseTable("");
          setupCourseModal();
        } else if (currentUser.role === "faculty") {
          main.innerHTML = `
          <div class="page-header">
            <h2 class="page-title">My Courses</h2>
          </div>
          <div class="toolbar" style="margin-bottom: 1.25rem;">
            <div style="position:relative; width:100%; max-width:320px;">
              <span class="material-icons" style="position:absolute; left:0.875rem; top:50%; transform:translateY(-50%); color:hsl(var(--muted-foreground)); font-size:1.125rem; pointer-events:none;">search</span>
              <input type="text" id="facultyCourseSearch" class="form-control" placeholder="Search my courses..." style="padding-left:2.5rem; border-radius:10px; height:38px;">
            </div>
          </div>
          <div id="facultyCoursesWrap"></div>
          <div id="facultyCoursesPagination"></div>
        `;
          currentFacultyCoursesPage = 1;
          document.getElementById("facultyCourseSearch").addEventListener("input", (e) => {
             currentFacultyCoursesPage = 1;
             let courses = DB.get("courses").filter(c => c.facultyId === currentUser.id);
             if (e.target.value) {
                const q = e.target.value.toLowerCase();
                courses = courses.filter(c => c.name.toLowerCase().includes(q) || (c.batch && c.batch.toLowerCase().includes(q)));
             }
             renderFacultyCourseTable(courses);
          });
          const courses = DB.get("courses").filter(
            (c) => c.facultyId === currentUser.id,
          );
          renderFacultyCourseTable(courses);
        } else {
          main.innerHTML = `
          <div class="page-header">
            <h2 class="page-title">Course Catalog</h2>
          </div>
          <div class="toolbar" style="margin-bottom: 1.25rem;">
            <div style="position:relative; width:100%; max-width:320px;">
              <span class="material-icons" style="position:absolute; left:0.875rem; top:50%; transform:translateY(-50%); color:hsl(var(--muted-foreground)); font-size:1.125rem; pointer-events:none;">search</span>
              <input type="text" id="catalogSearch" class="form-control" placeholder="Search catalog..." style="padding-left:2.5rem; border-radius:10px; height:38px;">
            </div>
          </div>
          <div class="card-grid" id="catalogGrid"></div>
          <div id="catalogPagination"></div>
        `;
          currentCatalogPage = 1;
          document.getElementById("catalogSearch").addEventListener("input", (e) => {
              currentCatalogPage = 1;
              renderCatalog(e.target.value);
          });
          renderCatalog("");
        }
      }

      function renderAdminCourseTable(query = "") {
        const wrap = document.getElementById("coursesTableWrap");
        let courses = DB.get("courses");
        if (query) {
           const q = query.toLowerCase();
           courses = courses.filter(c => c.name.toLowerCase().includes(q) || (c.batch && c.batch.toLowerCase().includes(q)));
        }
        if (!courses.length) {
          wrap.innerHTML = `<p class="empty-state">No courses found.</p>`;
          const pagContainer = document.getElementById("adminCoursesPagination");
          if (pagContainer) pagContainer.innerHTML = "";
          return;
        }
        const paginatedCourses = courses.slice((currentAdminCoursesPage - 1) * 6, currentAdminCoursesPage * 6);
        const rows = paginatedCourses
          .map((c) => {
            const enrolledCount = DB.get("enrollments").filter(
              (e) => e.courseId === c.id && e.status !== "Cancelled",
            ).length;
            return `<tr>
          <td>${c.name}</td>
          <td>${c.batch}</td>
          <td>${c.duration}</td>
          <td>${enrolledCount}/${c.capacity}</td>
          <td>${formatCurrency(c.fee)}</td>
          <td>${statusPill(c.status)}</td>
          <td class="actions-cell">
            <button class="icon-btn edit-course" data-id="${c.id}"><span class="material-icons">edit</span></button>
            <button class="icon-btn delete-course" data-id="${c.id}"><span class="material-icons">delete</span></button>
          </td>
        </tr>`;
          })
          .join("");
        wrap.innerHTML = `
        <table class="data-table">
          <thead><tr><th>Name</th><th>Batch</th><th>Duration</th><th>Seats</th><th>Fee</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;

        renderPagination("adminCoursesPagination", courses.length, currentAdminCoursesPage, 6, (newPage) => {
          currentAdminCoursesPage = newPage;
          renderAdminCourseTable();
        });

        wrap
          .querySelectorAll(".edit-course")
          .forEach((btn) =>
            btn.addEventListener("click", () =>
              openCourseModal(btn.dataset.id),
            ),
          );
        wrap.querySelectorAll(".delete-course").forEach((btn) =>
          btn.addEventListener("click", () => {
            showConfirmModal("Delete Course", "Are you sure you want to delete this course? This cannot be undone.", () => {
              const courseId = btn.dataset.id;
              
              // Cancel all active enrollments for this course
              const enrollments = DB.get("enrollments").filter(e => e.courseId === courseId && e.status !== "Cancelled");
              enrollments.forEach(e => {
                 DB.update("enrollments", e.id, { status: "Cancelled" });
              });
              
              // Remove waitlist entries
              const waitlistEntries = DB.get("waitlist").filter(w => w.courseId === courseId);
              waitlistEntries.forEach(w => {
                 DB.remove("waitlist", w.id);
              });

              DB.remove("courses", courseId);
              renderAdminCourseTable(document.getElementById("adminCourseSearch") ? document.getElementById("adminCourseSearch").value : "");
              showToast("Course deleted and enrollments cancelled.", "success");
            });
          }),
        );
      }

      function renderFacultyCourseTable(courses) {
        const wrap = document.getElementById("facultyCoursesWrap");
        if (!courses.length) {
          wrap.innerHTML = `<p class="empty-state">No courses assigned to you.</p>`;
          const pagContainer = document.getElementById("facultyCoursesPagination");
          if (pagContainer) pagContainer.innerHTML = "";
          return;
        }
        const paginatedCourses = courses.slice((currentFacultyCoursesPage - 1) * 6, currentFacultyCoursesPage * 6);
        const rows = paginatedCourses
          .map((c) => {
            const enrolledCount = DB.get("enrollments").filter(
              (e) => e.courseId === c.id && e.status !== "Cancelled",
            ).length;
            return `<tr><td>${c.name}</td><td>${c.batch}</td><td>${c.schedule}</td><td>${enrolledCount}/${c.capacity}</td><td>${statusPill(c.status)}</td></tr>`;
          })
          .join("");
        wrap.innerHTML = `<table class="data-table"><thead><tr><th>Name</th><th>Batch</th><th>Schedule</th><th>Seats</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table>`;

        renderPagination("facultyCoursesPagination", courses.length, currentFacultyCoursesPage, 6, (newPage) => {
          currentFacultyCoursesPage = newPage;
          renderFacultyCourseTable(courses);
        });
      }

      function renderCatalog(query = "") {
        const grid = document.getElementById("catalogGrid");
        let courses = DB.get("courses").filter((c) => c.status === "Active");
        if (query) {
           const q = query.toLowerCase();
           courses = courses.filter(c => c.name.toLowerCase().includes(q) || (c.batch && c.batch.toLowerCase().includes(q)));
        }
        const myEnrollments = DB.get("enrollments").filter(
          (e) => e.studentId === currentUser.studentId,
        );
        const myCourseIds = myEnrollments
          .filter((e) => e.status !== "Cancelled")
          .map((e) => e.courseId);

        if (!courses.length) {
          grid.innerHTML = `<p class="empty-state">No courses active.</p>`;
          const pagContainer = document.getElementById("catalogPagination");
          if (pagContainer) pagContainer.innerHTML = "";
          return;
        }

        const paginatedCatalog = courses.slice((currentCatalogPage - 1) * 6, currentCatalogPage * 6);
        grid.innerHTML = paginatedCatalog
          .map((c) => {
            const enrolledCount = DB.get("enrollments").filter(
              (e) => e.courseId === c.id && e.status !== "Cancelled",
            ).length;
            const seatsLeft = c.capacity - enrolledCount;
            const alreadyEnrolled = myCourseIds.includes(c.id);
            const prereqCourse = c.prerequisite
              ? DB.getById("courses", c.prerequisite)
              : null;
            const prereqMet =
              !c.prerequisite ||
              myEnrollments.some(
                (e) =>
                  (e.courseId === c.prerequisite && e.status === "Completed") ||
                  e.status === "Active",
              );

            let actionBtn;
            if (alreadyEnrolled) {
              actionBtn = `<button class="btn btn-secondary btn-enrolled" disabled><span class="material-icons" style="font-size:1rem;vertical-align:middle;margin-right:0.25rem">check</span>Enrolled</button>`;
            } else if (!prereqMet) {
              actionBtn = `<button class="btn btn-secondary" disabled title="Prerequisite not met">Prerequisite Required</button>`;
            } else if (seatsLeft > 0) {
              actionBtn = `<button class="btn btn-primary enroll-btn" data-id="${c.id}">Enroll</button>`;
            } else {
              actionBtn = `<button class="btn btn-secondary join-waitlist-btn" data-id="${c.id}">Join Waitlist</button>`;
            }

            const occupancyPct = (enrolledCount / c.capacity) * 100;
            const fillClass = occupancyPct >= 90 ? "fill-red" : occupancyPct >= 60 ? "fill-amber" : "fill-green";

            return `
          <div class="course-card">
            <div class="course-card-header">
              <div class="course-card-icon">
                <span class="material-icons">class</span>
              </div>
              <span class="pill ${seatsLeft > 0 ? "pill-green" : "pill-red"}">${seatsLeft > 0 ? seatsLeft + " seats left" : "Full"}</span>
            </div>
            <h4>${c.name}</h4>
            <div class="course-specs">
              <span class="spec-item"><span class="material-icons">layers</span>Batch: ${c.batch}</span>
              <span class="spec-item"><span class="material-icons">schedule</span>Duration: ${c.duration}</span>
              <span class="spec-item"><span class="material-icons">calendar_today</span>Slot: ${c.schedule}</span>
            </div>
            
            <div class="seat-progress-container">
              <div class="seat-progress-lbl">
                <span>Seats Occupied</span>
                <span>${enrolledCount}/${c.capacity}</span>
              </div>
              <div class="seat-progress-bar">
                <div class="seat-progress-fill ${fillClass}" style="width: ${Math.min(occupancyPct, 100)}%"></div>
              </div>
            </div>

            <div class="course-card-footer">
              <span class="course-fee">${formatCurrency(c.fee)}</span>
              ${prereqCourse ? `<span class="pill pill-blue" style="font-size:0.6875rem; white-space: normal; text-align: center;" title="Requires: ${prereqCourse.name}">Requires: ${prereqCourse.name}</span>` : ""}
            </div>
            
            <div class="course-actions">${actionBtn}</div>
          </div>
        `;
          })
          .join("");

        renderPagination("catalogPagination", courses.length, currentCatalogPage, 6, (newPage) => {
          currentCatalogPage = newPage;
          renderCatalog();
        });

        grid
          .querySelectorAll(".enroll-btn")
          .forEach((btn) =>
            btn.addEventListener("click", () => enrollSelf(btn.dataset.id)),
          );
        grid
          .querySelectorAll(".join-waitlist-btn")
          .forEach((btn) =>
            btn.addEventListener("click", () =>
              joinWaitlistSelf(btn.dataset.id),
            ),
          );
      }

      function enrollSelf(courseId) {
        const course = DB.getById("courses", courseId);
        const enrollment = DB.add("enrollments", {
          studentId: currentUser.studentId,
          courseId: courseId,
          enrollDate: new Date().toISOString(),
          status: "Active",
          totalFee: course.fee,
          paidAmount: 0,
        });
        pushNotification(
          currentUser.id,
          `You have been enrolled in ${course.name}. Invoice generated for ${formatCurrency(course.fee)}.`,
          "info",
        );
        showToast("Enrolled successfully! Invoice generated.", "success");
        renderCatalog();
      }

      function joinWaitlistSelf(courseId) {
        const course = DB.getById("courses", courseId);
        // Duplicate check (BUG 3/12)
        var existing = DB.get("waitlist").some(function (w) {
          return w.studentId === currentUser.studentId && w.courseId === courseId;
        });
        if (existing) {
          showToast("You are already on the waitlist for this course.", "info");
          return;
        }
        const position =
          DB.get("waitlist").filter((w) => w.courseId === courseId).length + 1;
        DB.add("waitlist", {
          studentId: currentUser.studentId,
          courseId,
          position,
          addedDate: new Date().toISOString(),
        });
        pushNotification(
          currentUser.id,
          `You have been added to the waitlist for ${course.name} (position ${position}).`,
          "info",
        );
        showToast("Added to waitlist successfully.", "success");
        renderCatalog();
      }

      function openCourseModal(id) {
        const modal = document.getElementById("courseModal");
        const title = document.getElementById("courseModalTitle");
        document.getElementById("courseForm").reset();
        document.getElementById("courseFormError").classList.add("hidden");

        const prereqSelect = document.getElementById("crPrerequisite");
        const allCourses = DB.get("courses").filter((c) => c.id !== id);
        prereqSelect.innerHTML =
          '<option value="">None</option>' +
          allCourses
            .map((c) => `<option value="${c.id}">${c.name}</option>`)
            .join("");

        const facultySelect = document.getElementById("crFaculty");
        const facultyUsers = DB.get("users").filter(
          (u) => u.role === "faculty",
        );
        facultySelect.innerHTML =
          '<option value="">Unassigned</option>' +
          facultyUsers
            .map((u) => `<option value="${u.id}">${u.name}</option>`)
            .join("");

        if (id) {
          const c = DB.getById("courses", id);
          title.textContent = "Edit Course";
          document.getElementById("courseId").value = c.id;
          document.getElementById("crName").value = c.name;
          document.getElementById("crBatch").value = c.batch;
          document.getElementById("crDuration").value = c.duration;
          document.getElementById("crSchedule").value = c.schedule;
          document.getElementById("crCapacity").value = c.capacity;
          document.getElementById("crFee").value = c.fee;
          prereqSelect.value = c.prerequisite || "";
          facultySelect.value = c.facultyId || "";
          document.getElementById("crFeePlanType").value =
            c.feePlanType || "One-Time";
        } else {
          title.textContent = "Add Course";
          document.getElementById("courseId").value = "";
        }
        modal.classList.remove("hidden");
      }

      function closeCourseModal() {
        document.getElementById("courseModal").classList.add("hidden");
      }

      function setupCourseModal() {
        document
          .getElementById("closeCourseModal")
          .addEventListener("click", closeCourseModal);
        document
          .getElementById("cancelCourseForm")
          .addEventListener("click", closeCourseModal);

        document
          .getElementById("courseForm")
          .addEventListener("submit", (e) => {
            e.preventDefault();
            const id = document.getElementById("courseId").value;
            const name = document.getElementById("crName").value.trim();
            const capacity = Number(
              document.getElementById("crCapacity").value,
            );
            const fee = Number(document.getElementById("crFee").value);
            const errorEl = document.getElementById("courseFormError");

            if (!validateRequired(name))
              return showFormErr(errorEl, "Course name is required.");
            if (!capacity || capacity < 1)
              return showFormErr(errorEl, "Capacity must be at least 1.");
            if (fee < 0 || isNaN(fee))
              return showFormErr(errorEl, "Fee must be a valid number.");
            errorEl.classList.add("hidden");

            const payload = {
              name,
              batch: document.getElementById("crBatch").value.trim(),
              duration: document.getElementById("crDuration").value.trim(),
              schedule: document.getElementById("crSchedule").value.trim(),
              capacity,
              fee,
              prerequisite:
                document.getElementById("crPrerequisite").value || null,
              facultyId: document.getElementById("crFaculty").value || null,
              feePlanType: document.getElementById("crFeePlanType").value,
              installments: [],
              status: "Active",
            };

            if (id) {
              DB.update("courses", id, payload);
              showToast("Course updated successfully.", "success");
            } else {
              DB.add("courses", payload);
              showToast("Course created successfully.", "success");
            }

            closeCourseModal();
            renderAdminCourseTable();
          });
      }

      function showFormErr(el, msg) {
        el.textContent = msg;
        el.classList.remove("hidden");
      }
    </script>
  </body>
</html>
